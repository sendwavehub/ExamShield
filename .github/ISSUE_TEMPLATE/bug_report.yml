name: Bug Report
description: Something isn't working correctly
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill in as much detail as you can.
        **If this is a security vulnerability, do NOT open an issue — see [SECURITY.md](../../SECURITY.md).**

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start Docker stack
        2. POST /capture with payload ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - API (ASP.NET Core)
        - Mobile (Flutter)
        - Dashboard (React)
        - Infrastructure (EF Core / MinIO / Redis)
        - OCR Pipeline
        - Auth / RBAC
        - Docker / Kubernetes
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: e.g. main @ abc1234
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS: macOS 14.5
        Docker: 26.1
        .NET: 9.0.x
        Browser (if dashboard): Chrome 125

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or stack trace
      render: shell
