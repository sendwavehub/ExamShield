name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOTNET_VERSION: "10.0.x"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/api

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: examshield_test
          POSTGRES_USER: examshield
          POSTGRES_PASSWORD: examshield
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Run unit tests
        run: >
          dotnet test tests/ExamShield.UnitTests/
          --no-build -c Release
          --logger "trx;LogFileName=unit-results.trx"
          --results-directory ./test-results

      - name: Run integration tests
        env:
          ConnectionStrings__DefaultConnection: >-
            Host=localhost;Port=5432;Database=examshield_test;
            Username=examshield;Password=examshield
        run: >
          dotnet test tests/ExamShield.IntegrationTests/
          --no-build -c Release
          --logger "trx;LogFileName=integration-results.trx"
          --results-directory ./test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./test-results/*.trx

  dashboard:
    name: Dashboard (TypeScript + Tests)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/ExamShield.Dashboard/package-lock.json

      - name: Install dependencies
        working-directory: src/ExamShield.Dashboard
        run: npm ci

      - name: Type-check
        working-directory: src/ExamShield.Dashboard
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: src/ExamShield.Dashboard
        run: npm test -- --run

  ocr-service:
    name: OCR Service (Python + Docker)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: src/ExamShield.OcrService
        run: pip install -r requirements.txt

      - name: Smoke-test OCR service startup
        working-directory: src/ExamShield.OcrService
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8081 &
          sleep 3
          curl -sf http://localhost:8081/health
          kill %1

      - name: Build Docker image
        run: docker build -t examshield-ocr src/ExamShield.OcrService/

  flutter:
    name: Mobile App (Flutter + Tests)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.x"
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: src/ExamShield.Mobile
        run: flutter pub get

      - name: Analyze
        working-directory: src/ExamShield.Mobile
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        working-directory: src/ExamShield.Mobile
        run: flutter test --reporter=expanded

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [build-and-test, dashboard, ocr-service, flutter]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
      security-events: write   # required to upload SARIF results

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push OCR image
        uses: docker/build-push-action@v5
        with:
          context: src/ExamShield.OcrService
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/ocr:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan API image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"   # report only — do not fail the build
          ignore-unfixed: true

      - name: Scan OCR image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository }}/ocr:${{ github.sha }}
          format: sarif
          output: trivy-ocr.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-api.sarif
          category: trivy-api

      - name: Upload OCR Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-ocr.sarif
          category: trivy-ocr
