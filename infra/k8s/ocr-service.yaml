apiVersion: v1
kind: ConfigMap
metadata:
  name: ocr-config
  namespace: examshield
data:
  OCR_NUM_QUESTIONS: "100"
  OCR_NUM_OPTIONS: "5"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocr-service
  namespace: examshield
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ocr-service
  template:
    metadata:
      labels:
        app: ocr-service
    spec:
      containers:
        - name: ocr-service
          image: ghcr.io/examshield/ocr:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: ocr-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: ocr-service
  namespace: examshield
spec:
  selector:
    app: ocr-service
  ports:
    - port: 8081
      targetPort: 8081
