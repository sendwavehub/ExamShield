# ExamShield dashboard — nginx reverse proxy configuration
# Serves the compiled React SPA and proxies /api/* → the backend API container.

server {
    listen 80;
    server_name _;

    # ── Static dashboard ───────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # Cache immutable hashed assets aggressively; never cache index.html
    location ~* \.(?:js|css|woff2?|svg|png|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # All other paths → SPA (React Router handles routing client-side)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Simple health check for the dashboard container itself
    location = /health.txt {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── API proxy ──────────────────────────────────────────────────────────
    # Proxy /api/* → http://api:8080/* (strips the /api prefix)
    # The React dashboard is built with VITE_API_URL=/api so all api calls
    # hit this location and get forwarded to the backend container.
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 50M;
    }

    # SignalR WebSocket proxy (notification hub)
    location /hubs/ {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
        proxy_buffering    off;
    }
}
