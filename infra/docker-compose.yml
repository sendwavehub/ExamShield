services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: examshield
      POSTGRES_USER: examshield
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-examshield}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U examshield -d examshield"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-examshield}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-examshield}
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI  →  http://localhost:15672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"   # S3-compatible API
      - "9001:9001"   # Console UI  →  http://localhost:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Creates the bucket (with Object Lock if MINIO_ENABLE_LOCK=true) once MinIO is healthy.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-examshield}
      MINIO_ENABLE_LOCK: ${MINIO_ENABLE_LOCK:-false}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY
        if [ \"$$MINIO_ENABLE_LOCK\" = 'true' ]; then
          mc mb --with-lock --ignore-existing local/$$MINIO_BUCKET
          mc retention set --default compliance 10y local/$$MINIO_BUCKET
          echo 'Bucket $$MINIO_BUCKET created with Object Lock (COMPLIANCE, 10y).'
        else
          mc mb --ignore-existing local/$$MINIO_BUCKET
          echo 'Bucket $$MINIO_BUCKET ready (no Object Lock).'
        fi
        mc anonymous set none local/$$MINIO_BUCKET
      "

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
