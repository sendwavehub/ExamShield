# ExamShield — Production Docker Compose (single-server deployment)
# Usage:
#   cp .env.example .env && nano .env   ← fill in secrets
#   docker compose -f docker-compose.prod.yml up -d
#
# All infrastructure services are internal (no host ports except where noted).
# The API runs on port 8080; put nginx/Traefik/Caddy in front for TLS.

services:

  # ── Database ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB:       examshield
      POSTGRES_USER:     examshield
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No host port — access only within Docker network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U examshield -d examshield"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [backend]
    logging: &default-logging
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # ── Cache ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks: [backend]
    logging: *default-logging

  # ── Message broker ─────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-examshield}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    # Management UI on localhost only — do not expose to internet
    ports:
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [backend]
    logging: *default-logging

  # ── Object storage ─────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
    volumes:
      - minio_data:/data
    # Console on localhost only — do not expose to internet
    ports:
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [backend]
    logging: *default-logging

  minio-init:
    image: minio/mc:latest
    restart: on-failure
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET:     ${MINIO_BUCKET:-examshield}
      MINIO_ENABLE_LOCK: ${MINIO_ENABLE_LOCK:-true}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY
        if [ \"$$MINIO_ENABLE_LOCK\" = 'true' ]; then
          mc mb --with-lock --ignore-existing local/$$MINIO_BUCKET
          mc retention set --default compliance 10y local/$$MINIO_BUCKET
        else
          mc mb --ignore-existing local/$$MINIO_BUCKET
        fi
        mc anonymous set none local/$$MINIO_BUCKET
        echo 'MinIO bucket ready.'
      "
    networks: [backend]

  # ── API ────────────────────────────────────────────────────────────────────
  api:
    image: ${API_IMAGE:-examshield-api}:${APP_VERSION:-latest}
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT:          Production
      Features__AutoSeedDemo:          "false"

      ConnectionStrings__DefaultConnection: >-
        Host=postgres;Port=5432;Database=examshield;
        Username=examshield;Password=${POSTGRES_PASSWORD}

      Jwt__Secret:           ${JWT_SECRET:?JWT_SECRET is required}
      Jwt__Issuer:           ${JWT_ISSUER:-ExamShield}
      Jwt__Audience:         ${JWT_AUDIENCE:-ExamShield}
      Jwt__ExpirationMinutes: "60"

      Cache__Type:            Redis
      Cache__ConnectionString: "redis:6379,password=${REDIS_PASSWORD}"

      Messaging__Type:        RabbitMQ
      Messaging__Host:        rabbitmq
      Messaging__Port:        "5672"
      Messaging__Username:    ${RABBITMQ_USER:-examshield}
      Messaging__Password:    ${RABBITMQ_PASSWORD}
      Messaging__VirtualHost: /
      Messaging__OcrQueueName: ocr.requests

      Storage__Type:          MinIO
      Storage__Endpoint:      minio:9000
      Storage__AccessKey:     ${MINIO_ACCESS_KEY}
      Storage__SecretKey:     ${MINIO_SECRET_KEY}
      Storage__BucketName:    ${MINIO_BUCKET:-examshield}
      Storage__UseSSL:        "false"
      Storage__EnableObjectLock: ${MINIO_ENABLE_LOCK:-true}
      Storage__RetentionDays: "3650"
      Storage__RetentionMode: COMPLIANCE

      Ocr__Type:              ${OCR_TYPE:-Stub}
      Ocr__Endpoint:          ${OCR_ENDPOINT:-http://localhost:8081/ocr/extract}
      Ocr__TimeoutSeconds:    "30"

      Encryption__MasterKeyBase64: ${ENCRYPTION_MASTER_KEY:?ENCRYPTION_MASTER_KEY is required}
      Watermark__HmacKeyBase64:    ${WATERMARK_HMAC_KEY:?WATERMARK_HMAC_KEY is required}
      ServerSigning__PrivateKeyPem: ${SERVER_SIGNING_KEY:?SERVER_SIGNING_KEY is required}

      Cors__AllowedOrigins__0: ${DASHBOARD_URL:-http://localhost}
    ports:
      - "${API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [backend, frontend]
    logging: *default-logging

  # ── Dashboard (nginx static server) ───────────────────────────────────────
  dashboard:
    image: nginx:1.27-alpine
    restart: always
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${DASHBOARD_PORT:-80}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health.txt || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 3
    networks: [frontend]
    logging: *default-logging

networks:
  backend:
    driver: bridge
    internal: true   # infrastructure services cannot reach the internet directly
  frontend:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
