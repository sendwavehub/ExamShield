version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.10.5+9
  crypto: ^3.0.3
  cryptography: ^2.7.0
  http: ^1.2.1
  flutter_secure_storage: ^9.0.0
  sqflite: ^2.3.3+1
